<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Qr Code Rapor Sorgulama</title>

<style>

body{
margin:0;
font-family:Helvetica, Arial, sans-serif;
background:white;
display:flex;
flex-direction:column;
min-height:100vh;
overflow:hidden;
}

.header{
padding:2px 32px 10px 32px;
}

.title{
font-size:16.23px;
margin-top:32.8px;
}

.bluebar{
height:2px;
background:#2d7df6;
margin-top:3.2px;
}

.container{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
}

h1{
font-size:20px;
margin-bottom:5px;
}

.sub{
font-size:16px;
font-weight:normal;
margin-top:7px;
}

.desc{
color:black;
font-size:12px;
margin-top:6px;
}

.input-group{
margin-top:25px;
width:230px;
position:relative;
}

.input-group input{
width:100%;
padding:10px;
font-size:15px;
border-radius:4px;
border:1px solid #ccc;
outline:none;
}

.input-group input:focus{
border-color:#2d7df6;
}

.input-group label{
position:absolute;
left:10px;
top:11px;
color:#dddddd;
font-size:14px;
background:white;
padding:0 4px;
transition:0.2s;
pointer-events:none;
}

.input-group input:focus + label,
.input-group input:valid + label{
top:-8px;
font-size:12px;
color:#2d7df6;
}

button{
margin-top:25px;
width:750px;
max-width:50%;
height:35px;
padding:7px 20px 5px 10px;
font-family:Helvetica;
font-size:14.7px;
background:linear-gradient(to bottom,#ffa726,#fb8c00);
color:white;
border:none;
border-radius:4px;
cursor:pointer;
transition:all .2s ease;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 3px 10px rgba(0,0,0,0.2);
background:#e67e00;
}

.footer{
text-align:center;
padding:14px;
background:#f3f3f3;
border-top:1px solid #cfcfcf;
font-size:14px;
color:#555;
box-shadow:0 5px 8px rgba(0,0,0,0.40);
}

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:#bfbfbf;
width:90%;
max-width:1200px;
height:90%;
border-radius:6px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
display:flex;
flex-direction:column;
overflow:hidden;
}

.modal-header{
background:white;
padding:16px 25px;
border-bottom:1px solid #ddd;
height:40px;
}

.modal-icons{
float:right;
display:flex;
gap:10px;
align-items:center;
}

.modal-body{
background:rgba(0,0,0,0.34);
padding:30px 20px;
flex:1;
overflow:auto;
text-align:center;
position:relative;
}

.evrak{
max-width:1000px;
width:100%;
height:auto;
background:white;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
}

.modal-footer{
position:relative;
padding:25px 20px;
background:white;
border-top:1px solid #ddd;
}

.modal-footer button{
position:absolute;
left:97%;
top:-20px;
transform:translate(-50%,0);
background:none;
border:none;
color:#1976d2;
font-size:14px;
cursor:pointer;
}

.icon{
cursor:pointer;
}

/* TOAST HATA MESAJI */

.toast{
position:fixed;
top:20px;
right:20px;
background:#1e1e1e;
color:white;
padding:14px 40px 18px 20px;
border-radius:8px;
font-size:14px;
display:none;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
overflow:hidden;
}

.toast-close{
position:absolute;
top:6px;
right:10px;
cursor:pointer;
font-size:18px;
}

.toast-progress{
position:absolute;
bottom:0;
left:0;
height:4px;
width:100%;
background:#e74c3c;
}

@keyframes slideIn{
from{transform:translateX(120%);opacity:0;}
to{transform:translateX(0);opacity:1;}
}

@keyframes slideOut{
from{transform:translateX(0);opacity:1;}
to{transform:translateX(120%);opacity:0;}
}

</style>
</head>

<body>

<div class="header">
<div class="title">Qr Code Rapor Sorgulama</div>
<div class="bluebar"></div>
</div>

<div class="container">

<h1>ANTAKYA BELEDİYESİ</h1>

<div class="sub">Qr Kod Rapor Sorgulama Ekranı</div>

<div class="desc">T.C.Kimlik/Vergi No ile doğrulama yapmanız gerekmektedir.</div>

<div class="input-group">
<input type="text" id="tcInput" required>
<label>T.C. Kimlik No</label>
</div>

<button onclick="raporSorgula()">

<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white" style="vertical-align:middle;margin-right:5px;">
<path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 
6.5 6.5 0 109.5 16c1.61 0 3.09-.59 
4.23-1.57l.27.28v.79l5 
4.99L20.49 19l-4.99-5zm-6 
0C7.01 14 5 11.99 5 
9.5S7.01 5 9.5 5 14 
7.01 14 9.5 11.99 14 
9.5 14z"/>
</svg>

Rapor Sorgula
</button>

</div>

<div id="toast" class="toast" onmouseenter="pauseToast()" onmouseleave="resumeToast()">

❗ Yanlış T.C./Vergi No girdiniz.

<span class="toast-close" onclick="closeToast()">×</span>

<div id="toast-progress" class="toast-progress"></div>

</div>

<div id="modal" class="modal">

<div class="modal-content">

<div class="modal-header">

<div class="modal-icons">
<img src="pdf.png" width="38" class="icon" onclick="downloadPDF()">
<img src="excel.png" width="38">
<img src="close.png" width="34" class="icon" onclick="closeModal()">
</div>

</div>

<div class="modal-body">
<img src="evrak.jpg" class="evrak">
</div>

<div class="modal-footer">
<button onclick="closeModal()">KAPAT</button>
</div>

</div>

</div>

<script>
let toastTimer;
let progressInterval;

let totalTime = 6000;
let remainingTime = totalTime;
let startTime;

function showToast(){

const toast=document.getElementById("toast");
const progress=document.getElementById("toast-progress");

toast.style.display="block";
toast.style.animation="slideIn .4s ease";

progress.style.width="100%";

remainingTime = totalTime;
startTime = Date.now();

progressInterval=setInterval(updateProgress,10);

toastTimer=setTimeout(closeToast,totalTime);

}

function updateProgress(){

let elapsed = Date.now() - startTime;
let percent = ((remainingTime - elapsed) / totalTime) * 100;

if(percent < 0) percent = 0;

document.getElementById("toast-progress").style.width = percent + "%";

}

function pauseToast(){

clearTimeout(toastTimer);
clearInterval(progressInterval);

let elapsed = Date.now() - startTime;
remainingTime = remainingTime - elapsed;

}

function resumeToast(){

startTime = Date.now();

toastTimer = setTimeout(closeToast, remainingTime);

progressInterval = setInterval(updateProgress,10);

}

function closeToast(){

const toast=document.getElementById("toast");

toast.style.animation="slideOut .4s ease";

setTimeout(()=>{
toast.style.display="none";
},400);

clearTimeout(toastTimer);
clearInterval(progressInterval);

}

</script>

</body>
</html>
