<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>QR Kod Rapor Sorgulama</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#efefef;
text-align:center;
}

/* başlık */

.baslik{
margin-top:80px;
}

.baslik h1{
font-size:40px;
margin:0;
color:#333;
font-weight:700;
}

.baslik h2{
margin-top:15px;
font-weight:500;
color:#444;
}

.baslik p{
color:#666;
margin-top:5px;
}

/* arama alanı */

input{
margin-top:50px;
width:420px;
padding:18px;
font-size:20px;
border-radius:8px;
border:1px solid #cfcfcf;
background:#f7f7f7;
}

/* turuncu buton */

button{
margin-top:40px;
width:80%;
max-width:900px;
padding:20px;
font-size:24px;
background:linear-gradient(90deg,#ff9900,#ff8800);
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

button:hover{
background:linear-gradient(90deg,#ff8800,#ff7700);
}

#sonuc{
margin-top:40px;
font-size:18px;
}

a{
display:block;
margin-top:10px;
font-size:18px;
}

</style>
</head>

<body>

<div class="baslik">

<h1>ANTAKYA BELEDİYESİ</h1>

<h2>Qr Kod Rapor Sorgulama Ekranı</h2>

<p>T.C. Kimlik/Vergi No ile doğrulama yapmanız gerekmektedir.</p>

</div>

<input type="text" id="tc" placeholder="T.C. Kimlik No">

<br>

<button onclick="sorgula()">🔍 Rapor Sorgula</button>

<div id="sonuc"></div>

<script>

async function sorgula(){

let tc = document.getElementById("tc").value;

let veri = await fetch("veriler.json");
let data = await veri.json();

if(data[tc]){

let kisi = data[tc];

let html = "<h3>"+kisi.isim+"</h3>";

kisi.evraklar.forEach(function(e){

html += "<a href='"+e+"' target='_blank'>📄 Raporu Görüntüle</a>";

});

document.getElementById("sonuc").innerHTML = html;

}

else{

document.getElementById("sonuc").innerHTML="Kayıt bulunamadı";

}

}

</script>

</body>
</html>
