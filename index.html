<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Belge Doğrulama Sistemi</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin-top:100px;
}

.kutu{
background:white;
width:400px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:10px;
width:80%;
font-size:16px;
}

button{
padding:10px 20px;
margin-top:15px;
font-size:16px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
}

a{
display:block;
margin-top:10px;
}

</style>

</head>

<body>

<div class="kutu">

<h2>Belge Doğrulama</h2>

<input type="text" id="tc" placeholder="TC Kimlik No">

<br>

<button onclick="sorgula()">Sorgula</button>

<div id="sonuc"></div>

</div>

<script>

async function sorgula(){

let tc = document.getElementById("tc").value;

let veri = await fetch("veriler.json");
let data = await veri.json();

if(data[tc]){

let kisi = data[tc];

let html = "<h3>"+kisi.isim+"</h3>";

kisi.evraklar.forEach(function(e){

html += "<a href='"+e+"' target='_blank'>📄 Belgeyi Aç</a>";

});

document.getElementById("sonuc").innerHTML = html;

}

else{

document.getElementById("sonuc").innerHTML="Kayıt bulunamadı";

}

}

</script>

</body>
</html>
