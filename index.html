<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Qr Code Rapor Sorgulama</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
}

/* üst alan */

.header{
padding:15px 30px 10px 30px;
}

.title{
font-size:16px;
margin-top:30px;
}

.bluebar{
height:2px;
background:#2d7df6;
margin-top:30px;
}

/* orta alan */

.container{
text-align:center;
margin-top:260px;
}

h1{
font-size:20px;
margin-bottom:4px;
}

.sub{
font-size:15px;
font-weight:normal;
}

.desc{
color:black;
font-size:10px;
margin-top:3px;
}

/* input */

input{
margin-top:22px;
width:320px;
padding:12px;
font-size:15px;
border-radius:6px;
border:2px solid #2d7df6;
}

/* buton */

button{
margin-top:18px;
width:650px;
max-width:90%;
padding:12px;
font-size:16px;
background:#ff8c00;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#e67e00;
}

/* footer */

.footer{
position:fixed;
bottom:0;
width:100%;
text-align:center;
padding:14px;
background:#f1f1f1;
border-top:1px solid #ccc;
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
Qr Code Rapor Sorgulama
</div>

<div class="bluebar"></div>

</div>

<div class="container">

<h1>ANTAKYA BELEDİYESİ</h1>

<div class="sub">
Qr Kod Rapor Sorgulama Ekranı
</div>

<div class="desc">
T.C.Kimlik/Vergi No ile doğrulama yapmanız gerekmektedir.
</div>

<input type="text" placeholder="T.C. Kimlik No">

<br>

<button>🔍 Rapor Sorgula</button>

</div>

<div class="footer">
Belsoft Bilgi Sistemleri © 2026
</div>

</body>
</html>
