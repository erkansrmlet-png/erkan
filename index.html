<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Qr Code Rapor Sorgulama</title>

<style>

body{
margin:0;
font-family:Helvetica;
background:white;
}

/* üst alan */

.header{
padding:2px 32px 10px 32px;
}

.title{
font-size:16.23px;
margin-top:32.8px;
}

.bluebar{
height:2px;
background:#2d7df6;
margin-top:3.2px;
}

/* orta alan */

.container{
text-align:center;
margin-top:236px;
}

h1{
font-size:20px;
margin-bottom:5px;
}

.sub{
font-size:16px;
font-weight:normal;
margin-top:7.1px;
}

.desc{
color:black;
font-size:12px;
margin-top:5px;
}

/* input alanı */

.input-group{
position:relative;
width:228px;
margin:24px 0 0 468.5px;
}

.input-group input{
width:100%;
padding:10px;
font-size:15px;
border-radius:6px;
border:1px solid #ccc;
outline:none;
transition:0.2s;
}

.input-group input:focus{
border-color:#2d7df6;
}

.input-group label{
position:absolute;
left:12px;
top:12px;
color:#ccc;
font-size:14.5px;
background:white;
padding:0 4px;
transition:0.2s;
pointer-events:none;
}

.input-group input:focus + label,
.input-group input:valid + label{
top:-8px;
font-size:12px;
color:#2d7df6;
}

/* buton */

button{
margin-top:40px;
width:615px;
max-width:90%;
padding:8px;
font-size:16px;
background:#ff8c00;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#e67e00;
}

/* footer */

.footer{
position:fixed;
bottom:0;
width:100%;
text-align:center;
padding:14px;
background:#f1f1f1;
border-top:1px solid #ccc;
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
Qr Code Rapor Sorgulama
</div>

<div class="bluebar"></div>

</div>

<div class="container">

<h1>ANTAKYA BELEDİYESİ</h1>

<div class="sub">
Qr Kod Rapor Sorgulama Ekranı
</div>

<div class="desc">
T.C.Kimlik/Vergi No ile doğrulama yapmanız gerekmektedir.
</div>

<div class="input-group">
<input type="text" required>
<label>T.C. Kimlik No</label>
</div>

<br>

<button>🔍 Rapor Sorgula</button>

</div>

<div class="footer">
Belsoft Bilgi Sistemleri © 2026
</div>

</body>
</html>
