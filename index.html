<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Qr Code Rapor Sorgulama</title>

<style>

body{
margin:0;
font-family:Helvetica, Arial, sans-serif;
background:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

.header{
padding:2px 32px 10px 32px;
}

.title{
font-size:16.23px;
margin-top:32.8px;
}

.bluebar{
height:2px;
background:#2d7df6;
margin-top:3.2px;
}

.container{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:40px 20px;
}

h1{
font-size:20px;
margin-bottom:5px;
}

.sub{
font-size:16px;
font-weight:normal;
margin-top:7px;
}

.desc{
color:black;
font-size:12px;
margin-top:6px;
}

.input-group{
margin-top:25px;
width:230px;
position:relative;
}

.input-group input{
width:100%;
padding:10px;
font-size:15px;
border-radius:4px;
border:1px solid #ccc;
outline:none;
}

.input-group input:focus{
border-color:#2d7df6;
}

.input-group label{
position:absolute;
left:10px;
top:11px;
color:#dddddd;
font-size:14px;
background:white;
padding:0 4px;
transition:0.2s;
pointer-events:none;
}

.input-group input:focus + label,
.input-group input:valid + label{
top:-8px;
font-size:12px;
color:#2d7df6;
}

button{
margin-top:25px;
width:300px;
height:35px;
padding:7px 20px 5px 10px;
font-family:Helvetica;
font-size:14.7px;
background:linear-gradient(to bottom,#ffa726,#fb8c00);
color:white;
border:none;
border-radius:4px;
cursor:pointer;
transition:all .2s ease;
}

button:hover{
transform:translateY(-1px);
box-shadow:0 3px 10px rgba(0,0,0,0.2);
background:#e67e00;
}

.footer{
text-align:center;
padding:14px;
background:#f1f1f1;
border-top:1px solid #ccc;
font-size:14px;
color:#555;
}

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:#bfbfbf;
width:90%;
max-width:1200px;
height:90%;
border-radius:6px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
display:flex;
flex-direction:column;
}

.modal-header{
background:white;
padding:16px 25px;
border-bottom:1px solid #ddd;
height:40px;
}

.modal-icons{
float:right;
display:flex;
gap:24px;
align-items:center;
}

.modal-body{
background:rgba(0,0,0,0.34);
padding:30px 20px;
flex:1;
overflow:auto;
text-align:center;
position:relative;
}

.evrak{
max-width:900px;
width:100%;
height:auto;
background:white;
box-shadow:0 4px 15px rgba(0,0,0,0.25);
}

.pdf-warning{
display:none;
height:100%;
width:100%;
background:#e6e6e6;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.warning-buttons{
position:fixed;
top:90px;
right:40px;
display:flex;
gap:20px;
z-index:1000;
}

.warning-buttons button{
padding:12px 25px;
font-size:22px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
width:auto;
height:auto;
margin:0;
}

.g{background:#3aa189;}
.b{background:#3a7fb0;}
.r{background:#e74c3c;}

.warning-text{
font-size:55px;
color:#333;
max-width:900px;
}

@media (max-width:1000px){

.evrak{
display:none;
}

.pdf-warning{
display:flex;
}

.modal-icons{
display:none;
}

}

.modal-footer{
position:relative;
padding:10px 20px;
background:white;
border-top:1px solid #ddd;
}

.modal-footer button{
position:absolute;
left:95%;
top:-10px;
transform:translate(-50%,0);
background:none;
border:none;
color:#1976d2;
font-size:14px;
cursor:pointer;
}

.icon{
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<div class="title">Qr Code Rapor Sorgulama</div>
<div class="bluebar"></div>
</div>

<div class="container">

<h1>ANTAKYA BELEDİYESİ</h1>

<div class="sub">Qr Kod Rapor Sorgulama Ekranı</div>

<div class="desc">T.C.Kimlik/Vergi No ile doğrulama yapmanız gerekmektedir.</div>

<div class="input-group">
<input type="text" required>
<label>T.C. Kimlik No</label>
</div>

<button onclick="openModal()">

<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white" style="vertical-align:middle;margin-right:5px;">
<path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 
6.5 6.5 0 109.5 16c1.61 0 3.09-.59 
4.23-1.57l.27.28v.79l5 
4.99L20.49 19l-4.99-5zm-6 
0C7.01 14 5 11.99 5 
9.5S7.01 5 9.5 5 14 
7.01 14 9.5 11.99 14 
9.5 14z"/>
</svg>

Rapor Sorgula
</button>

</div>

<div class="footer">
Belsoft Bilgi Sistemleri © 2026
</div>

<div id="modal" class="modal">

<div class="modal-content">

<div class="modal-header">

<div class="modal-icons">
<img src="pdf.png" width="35" class="icon" onclick="downloadPDF()">
<img src="excel.png" width="35">
<img src="close.png" width="32" class="icon" onclick="closeModal()">
</div>

</div>

<div class="modal-body">

<div class="pdf-warning">

<div class="warning-buttons">
<button class="g" onclick="openDocument()">Görüntüle</button>
<button class="b" onclick="downloadPDF()">İndir</button>
<button class="r" onclick="closeModal()">Kapat</button>
</div>

<div class="warning-text">
PDF hazır. Yukarıdan <b>Görüntüle</b> butonuna basarak açabilirsiniz.
</div>

</div>

<img src="evrak.jpg" class="evrak">

</div>

<div class="modal-footer">
<button onclick="closeModal()">KAPAT</button>
</div>

</div>

</div>

<script>

function openModal(){
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function downloadPDF(){
var link=document.createElement("a");
link.href="evrak.jpg";
link.download="rapor.pdf";
link.click();
}

function openDocument(){
document.querySelector(".evrak").style.display="block";
document.querySelector(".pdf-warning").style.display="none";
}

</script>

</body>
</html>
