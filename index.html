<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Qr Code Rapor Sorgulama</title>

<style>

body{
margin:0;
font-family:Helvetica;
background:white;
}

/* üst alan */

.header{
padding:2px 32px 10px 32px;
}

.title{
font-size:16.23px;
margin-top:32.8px;
}

.bluebar{
height:2px;
background:#2d7df6;
margin-top:3.2px;
}

/* orta alan */

.container{
text-align:center;
margin-top:236px;
position:relative; /* container referansı için */
}

h1{
font-size:20px;
margin-bottom:5px;
}

.sub{
font-size:16px;
font-weight:normal;
margin-top:7.1px;
}

.desc{
color:black;
font-size:12px;
margin-top:5px;
}

/* input alanı */

.input-group{
position:absolute;
width:228px;
top:95.7px;          /* aşağı yukarı ayar */
left:50%;           /* yatay ortalama referansı */
transform:translateX(-56%); /* ortada, -50% ile tam ortada. Negatif artırırsan sola, azaltırsan sağa kayar */
}

.input-group input{
width:100%;
padding:10px;
font-size:15px;
border-radius:6px;
border:1px solid #ccc;
outline:none;
transition:0.2s;
}

.input-group input:focus{
border-color:#2d7df6;
}

.input-group label{
position:absolute;
left:10px;
top:11.1px;
color:#ccc;
font-size:14.3px;
background:white;
padding:0 4px;
transition:0.2s;
pointer-events:none;
}

.input-group input:focus + label,
.input-group input:valid + label{
top:-8px;
font-size:12px;
color:#2d7df6;
}

/* buton */

button{
margin-top:66px;
width:717px;
max-width:90%;
padding:4px;
font-family:Helvetica;
font-size:15px;
background:linear-gradient(to bottom,#ffa726,#fb8c00);
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#e67e00;
}

/* footer */

.footer{
position:fixed;
bottom:0;
width:100%;
text-align:center;
padding:14px;
background:#f1f1f1;
border-top:1px solid #ccc;
font-size:14px;
color:#555;
}

/* MODAL */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.modal-content{
background:white;
margin:4% auto;
width:85%;
max-width:1200px;
border-radius:6px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.modal-header{
padding:10px;
text-align:right;
border-bottom:1px solid #ddd;
}

.close{
font-size:22px;
cursor:pointer;
}

.modal-body{
padding:20px;
text-align:center;
max-height:80vh;
overflow-y:auto;
}

</style>
</head>

<body>

<div class="header">

<div class="title">
Qr Code Rapor Sorgulama
</div>

<div class="bluebar"></div>

</div>

<div class="container">

<h1>ANTAKYA BELEDİYESİ</h1>

<div class="sub">
Qr Kod Rapor Sorgulama Ekranı
</div>

<div class="desc">
T.C.Kimlik/Vergi No ile doğrulama yapmanız gerekmektedir.
</div>

<div class="input-group">
<input type="text" required>
<label>T.C. Kimlik No</label>
</div>

<br>
  
<button onclick="openModal()">🔍 Rapor Sorgula</button>

</div>

<div class="footer">
Belsoft Bilgi Sistemleri © 2026
</div>

<div id="modal" class="modal">

<div class="modal-content">

<div class="modal-header">
<span class="close" onclick="closeModal()">✕</span>
</div>

<div class="modal-body">

<img src="evrak.jpg" style="width:100%;">

</div>

</div>

</div>

<script>

function openModal(){
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
