<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Qr Code Rapor Sorgulama</title>

<style>

body{
    margin:0;
    font-family:Helvetica;
    background:white;
}

/* üst alan */
.header{
    padding:2px 32px 10px 32px;
}
.title{
    font-size:16.23px;
    margin-top:32.8px;
}
.bluebar{
    height:2px;
    background:#2d7df6;
    margin-top:3.2px;
}

/* orta alan */
.container{
    text-align:center;
    margin-top:236px;
    position:relative;
}
h1{
    font-size:20px;
    margin-bottom:5px;
}
.sub{
    font-size:16px;
    font-weight:normal;
    margin-top:7.1px;
}
.desc{
    color:black;
    font-size:12px;
    margin-top:5px;
}

/* input alanı */
.input-group{
    position:absolute;
    width:228px;
    top:96.6px;
    left:50%;
    transform:translateX(-56%);
}
.input-group input{
    width:100%;
    padding:10px;
    font-size:15px;
    border-radius:3px;
    border:1px solid #ccc;
    outline:none;
}
.input-group input:focus{
    border-color:#2d7df6;
}
.input-group label{
    position:absolute;
    left:10px;
    top:11px;
    color:#ccc;
    font-size:14px;
    background:white;
    padding:0 4px;
    transition:0.2s;
    pointer-events:none;
}
.input-group input:focus + label,
.input-group input:valid + label{
    top:-8px;
    font-size:12px;
    color:#2d7df6;
}

/* buton */
button{
    position:absolute;
    top:150.5px;
    left:50%;
    transform:translateX(-50%);
    width:55%;
    max-width:723px;
    min-width:120px;
    padding:4px;
    font-family:Helvetica;
    font-size:14.5px;
    background:linear-gradient(to bottom,#ffa726,#fb8c00);
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
button:hover{
    background:#e67e00;
}

/* footer */
.footer{
    position:fixed;
    bottom:0;
    width:100%;
    text-align:center;
    padding:14px;
    background:#f1f1f1;
    border-top:1px solid #ccc;
    font-size:14px;
    color:#555;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    z-index:999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}
.modal-content{
    background:#bfbfbf;
    margin:2.6% auto;
    width:90%;
    max-width:1200px;
    height:90vh; /* yüksekliği biraz kısaltıldı */
    border-radius:6px;
    box-shadow:0 15px 40px rgba(0,0,0,0.4);
    display:flex;
    flex-direction:column;
}

/* üst beyaz bar */
.modal-header{
    background:white;
    padding:16px 25px;
    border-bottom:1px solid #ddd;
    height:40px;
}

/* gri evrak alanı */
.modal-body{
    background: rgba(0, 0, 0, 0.34);
    padding:30px 20px 20px 20px;
    max-height:70vh;
    overflow-y:auto;
    text-align:center;
}

/* alt beyaz bar - KAPAT butonu sağ alt */

.modal-footer{
    position:relative; /* absolute kullanabilmek için */
    padding:25px 20px;
    background:white;
    border-top:1px solid #ddd;
}

.modal-footer button{
    position:absolute;
    left:95%;     /* yatay ortalar */
    top:50%;      /* dikey ortalar */
    transform:translate(-50%, -50%);
    background:none;
    border:none;
    color:#1976d2;
    font-size:14px;
    cursor:pointer;
}

/* modal close ikon (üst sağ köşe) */
.close{
    font-size:22px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
    <div class="title">Qr Code Rapor Sorgulama</div>
    <div class="bluebar"></div>
</div>

<div class="container">
    <h1>ANTAKYA BELEDİYESİ</h1>
    <div class="sub">Qr Kod Rapor Sorgulama Ekranı</div>
    <div class="desc">T.C.Kimlik/Vergi No ile doğrulama yapmanız gerekmektedir.</div>

    <div class="input-group">
        <input type="text" required>
        <label>T.C. Kimlik No</label>
    </div>

    <br>

    <button onclick="openModal()">🔍 Rapor Sorgula</button>
</div>

<div class="footer">
    Belsoft Bilgi Sistemleri © 2026
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">

        <div class="modal-header">
            <span style="float:right;margin-left:20px;cursor:pointer;">📄</span>
            <span style="float:right;margin-left:20px;cursor:pointer;">📊</span>
            <span class="close" onclick="closeModal()" style="float:right;">✕</span>
        </div>

        <div class="modal-body">
            <img src="evrak.jpg" style="width:86.1%; background:white; box-shadow:0 4px 15px rgba(0,0,0,0.25);">
        </div>

        <div class="modal-footer">
            <button onclick="closeModal()">KAPAT</button>
        </div>

    </div>
</div>

<script>
function openModal(){
    document.getElementById("modal").style.display="block";
}
function closeModal(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
