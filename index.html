<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qr Code Rapor Sorgulama</title>

<style>

body{
margin:0;
font-family:Helvetica, Arial, sans-serif;
background:white;
display:flex;
flex-direction:column;
min-height:100vh;
overflow:hidden;
}

.header{
padding:2px 32px 10px 32px;
}

.title{
font-size:16.23px;
margin-top:32.8px;
}

.bluebar{
height:2px;
background:#2d7df6;
margin-top:3.2px;
}

.container{ 
flex:1; 
display:flex; 
flex-direction:column; 
align-items:center; 
justify-content:center; 
text-align:center; 
padding:40px 20px; 
width:100%;
max-width:600px;
margin:auto;
}

h1{
font-size:20px;
margin-bottom:5px;
}

.sub{
font-size:16px;
margin-top:7px;
}

.desc{
font-size:12px;
margin-top:6px;
}

.input-group{
margin-top:25px;
width:100%;
max-width:260px;
position:relative;
}

.input-group input{
width:100%;
padding:10px;
font-size:15px;
border-radius:4px;
border:1px solid #ccc;
outline:none;
}

.input-group input:focus{
border-color:#2d7df6;
}

.input-group label{
position:absolute;
left:10px;
top:11px;
color:#ddd;
font-size:14px;
background:white;
padding:0 4px;
transition:0.2s;
pointer-events:none;
}

.input-group input:focus + label,
.input-group input:valid + label{
top:-8px;
font-size:12px;
color:#2d7df6;
}

button{
margin-top:25px;
width:100%;
max-width:300px;
height:40px;
font-size:15px;
background:linear-gradient(to bottom,#ffa726,#fb8c00);
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

.footer{
text-align:center;
padding:14px;
background:#f3f3f3;
border-top:1px solid #cfcfcf;
font-size:14px;
}

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:#bfbfbf;
width:90%;
max-width:1200px;
height:90%;
border-radius:6px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.modal-header{
background:white;
padding:16px 25px;
border-bottom:1px solid #ddd;
}

.modal-icons{
float:right;
display:flex;
gap:10px;
}

.modal-body{
background:rgba(0,0,0,0.34);
padding:30px 20px;
flex:1;
overflow:auto;
text-align:center;
}

.evrak{
max-width:1000px;
width:100%;
background:white;
}

.pdf-warning{
display:none; 
height:100%; 
width:100%; 
background:white; 
align-items:center; 
justify-content:center; 
flex-direction:column; 
text-align:center; 
} 
  
.warning-buttons{ 
position:fixed; 
top:50px; 
right:45px; 
display:flex; 
gap:15px; 
} 
  
.warning-buttons button{ 
padding:12px 15px; 
font-size:18px; 
border:none; 
border-radius:10px; 
color:white; 
cursor:pointer; 
} 
  
.g{background:#3aa189;} 
.b{background:#3a7fb0;} 
.r{background:#e74c3c;} 
  
.warning-text{ 
font-size:20px; 
max-width:300px; 
} 
  
@media (max-width:1000px){ 
  
.modal-body { 
background: white;
} 
  
.evrak{ 
display:none;
} 
  
.pdf-warning{ 
display:flex;
} 
  
.modal-icons{ 
display:none;
} 
}

</style>
</head>

<body>

<div class="header">
<div class="title">Qr Code Rapor Sorgulama</div>
<div class="bluebar"></div>
</div>

<div class="container">

<h1>ANTAKYA BELEDİYESİ</h1>

<div class="sub">Qr Kod Rapor Sorgulama Ekranı</div>

<div class="desc">T.C.Kimlik/Vergi No ile doğrulama yapmanız gerekmektedir.</div>

<div class="input-group">
<input type="text" id="tcInput" required>
<label>T.C. Kimlik No</label>
</div>

<button onclick="raporSorgula()">Rapor Sorgula</button>

</div>

<div id="toast" class="toast">
❗ Yanlış T.C./Vergi No girdiniz.
</div>

<div id="modal" class="modal">

<div class="modal-content">

<div class="modal-header">
<div class="modal-icons">
<img src="pdf.png" width="30" onclick="downloadPDF()">
<img src="close.png" width="30" onclick="closeModal()">
</div>
</div>

<div class="modal-body">

<div class="pdf-warning">
<div class="warning-buttons"> 
<button class="g" onclick="openDocument()">Görüntüle</button> 
<button class="b" onclick="downloadPDF()">İndir</button> 
<button class="r" onclick="closeModal()">Kapat</button> 
</div> 
  
<div class="warning-text"> 
PDF hazır. Yukarıdan görüntüleyebilirsiniz. 
</div>
</div>

<img src="evrak.jpg" class="evrak">

</div>

</div>

</div>

<script>

function openDocument(){ 
document.querySelector(".evrak").style.display="block"; 
document.querySelector(".pdf-warning").style.display="none"; 
}

function raporSorgula(){

var tc = document.getElementById("tcInput").value;

if(tc === "44986211745"){
openModal();
}else{
alert("Yanlış TC");
}

}

function openModal(){ 
document.getElementById("modal").style.display="flex";

if(window.innerWidth <= 1000){
document.querySelector(".evrak").style.display="none";
document.querySelector(".pdf-warning").style.display="flex";
}else{
document.querySelector(".evrak").style.display="block";
document.querySelector(".pdf-warning").style.display="none";
}

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function downloadPDF(){
var link=document.createElement("a");
link.href="evrak.pdf";
link.download="evrak.pdf";
link.click();
}

</script>

</body>
</html>
